name: Weekly Draft Generation

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-drafts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build draft cards
        run: node scripts/build-drafts.mjs --windows=7,14,30,60,90,180 --rows=50 --min-topic-count=5 --draft-limit-per-topic=5 --archive-days=365

      - name: Commit updated drafts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/crossref-latest.json data/drafts/article-drafts.json data/drafts/featured-drafts.json data/drafts/archive-records.json
          if git diff --cached --quiet; then
            echo "No draft changes to commit."
          else
            git commit -m "Update weekly article drafts"
            git push
          fi
